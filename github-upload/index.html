<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="杨梓韬个人求职作品网站，展示 AIGC 视觉、品牌文创、文旅 IP、AI 影像与空间设计作品。"
    />
    <title>杨梓韬作品集 | AIGC Visual / IP / Space</title>
    <link rel="stylesheet" href="./standalone-app.css?v=20260625-native-video-v1" />
    <style>
      .hero-gallery,
      #film,
      .film-section {
        display: none !important;
      }

      .hero-subtitle {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <main id="app-fallback" class="fallback-shell">
      <section class="fallback-hero">
        <p>Portfolio 2026 / AIGC Visual Direction</p>
        <h1>杨梓韬</h1>
        <strong>AIGC 视觉、IP 文创与空间设计创作者</strong>
        <span>作品网站正在加载。你也可以先查看简历和作品集。</span>
        <div>
          <a href="./public/resume.pdf">下载简历</a>
          <a href="./public/yang-zitao-ai.pdf">AI 作品集</a>
          <a href="./public/yang-zitao-environment-art.pdf">环境艺术作品集</a>
        </div>
      </section>
    </main>
    <div id="root"></div>
    <script>
      const enforcePortfolioUpdates = () => {
        document.querySelectorAll('.hero-gallery').forEach((node) => node.remove())
        document.querySelectorAll('#film, .film-section').forEach((node) => node.remove())
        document
          .querySelectorAll('.nav-links a[href="#film"], .nav-links a[href="#about"]')
          .forEach((node) => node.remove())

        document.querySelectorAll('.brandmark > span').forEach((node) => {
          if (node.textContent.trim() !== 'YANG ZITAO') {
            node.textContent = 'YANG ZITAO'
          }
        })
      }

      window.addEventListener('DOMContentLoaded', enforcePortfolioUpdates)
      window.addEventListener('load', enforcePortfolioUpdates)
      window.setTimeout(enforcePortfolioUpdates, 100)
      window.setTimeout(enforcePortfolioUpdates, 1000)
    </script>
    <script src="./standalone-app.js?v=20260625-native-video-v1"></script>
  </body>
</html>
